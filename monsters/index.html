<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monsters</title>
  <link rel="stylesheet" href="../assets/tailwind.css">
  <!-- <link rel="stylesheet" href="style.css" /> -->
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 text-slate-100">

  <!-- Top bar -->
  <header class="sticky top-0 z-40 border-b border-slate-800 bg-slate-950/70 backdrop-blur">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between gap-4">
      <a class="flex items-center gap-2" href="../index.html" aria-label="Monstra Home">
        <span class="inline-block w-3 h-3 rounded-full bg-emerald-500"></span>
        <span class="font-extrabold tracking-tight">Monstra</span>
      </a>

      <button class="hidden sm:flex items-center gap-2 rounded-full border border-slate-700 bg-slate-900/60 px-4 py-2 text-sm hover:bg-slate-900"
              type="button" aria-label="Search">
        <span>Monsters</span>
        <span class="text-slate-500">|</span>
        <span class="text-slate-400">Stage</span>
        <span class="text-slate-500">|</span>
        <span class="text-slate-400">Outcome</span>
        <span class="ml-1">🔍</span>
      </button>

      <div class="flex items-center gap-3">
        <span id="usernameTag" class="text-sm text-slate-300"></span>

        <span id="bytesTag" class="flex items-center gap-2 rounded-full border border-slate-700 bg-slate-900/60 px-3 py-1 text-sm">
          <span class="bytes-amount font-semibold">0</span>
          <img src="../assets/coin.png" alt="Monstra byte coin" class="h-5 w-5">
          <span class="bytes-label text-slate-300">Monstra Bytes</span>
        </span>

        <button id="logoutBtn" class="rounded-xl bg-rose-600 hover:bg-rose-500 px-3 py-2 text-sm font-semibold">
          Logout
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-10">
    <h1 class="text-3xl font-extrabold tracking-tight">Monsters</h1>

    <!-- Active Monsters Section -->
    <section class="mt-10">
      <h2>Active Monsters</h2>
      <p class="mt-2 text-sm text-slate-300">These are your current monsters.</p>
      <div id="activeGrid" class="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>

    <!-- Shop Section -->
    <section class="monsters-section">
      <h2>Monster Shop</h2>
      <p class="mt-2 text-sm text-slate-300">Buy new monsters for <strong class="font-semibold">1 Monstra Byte</strong> each.</p>
      <div id="shopGrid" class="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>
  </main>
  
  <script src="/Monstra/js/auth.js"></script>
  <script>
    // Auth guard & load user
    const email = checkAuthGuard();
    if (!email) return;

    const user = getCurrentUser();
    const username = user.username || "Player";
    let monstraBytes = user.monstraBytes ?? 0;
    let ownedMonsters = user.ownedMonsters || [];

    // Monsters catalog
    const monsters = [
      { id: "tauru", name: "Tauru", baseAsset: "TQQQ", hedgeAsset: "SQQQ" },
      { id: "aeros", name: "Aeros", baseAsset: "SPY", hedgeAsset: "SH" }
    ];

    // DOM references
    const usernameTag = document.getElementById("usernameTag");
    const bytesTag = document.getElementById("bytesTag");
    const activeGrid = document.getElementById("activeGrid");
    const shopGrid = document.getElementById("shopGrid");

    // Render username
    if (usernameTag) usernameTag.textContent = `Hi, ${username}!`;

    // Update header bytes
    function renderBytes() {
      const amountEl = bytesTag?.querySelector(".bytes-amount");
      if (amountEl) amountEl.textContent = monstraBytes;
    }
    renderBytes();

    // Save user state
    function saveUserState() {
      user.monstraBytes = monstraBytes;
      user.ownedMonsters = ownedMonsters;
      saveUser(email, user);
    }

    // Card templates
    function ownedCardHTML(m) {
      const preview = `../assets/monsters/${m.id}/preview.png`;
      return `
        <a class="card" href="./monster.html?id=${m.id}">
          <div class="card__imageWrap">
            <img class="card__image" src="${preview}" alt="${m.name} preview" loading="lazy">
          </div>
          <div class="card__body">
            <div class="card__row">
              <div class="card__title">${m.name}</div>
              <div class="card__meta">Stage 1</div>
            </div>
            <div class="card__sub">${m.baseAsset} → ${m.hedgeAsset}</div>
            <div class="card__sub">Sim: +30% / −10%</div>
            <div class="card__price">Owned</div>
          </div>
        </a>
      `;
    }

    function shopCardHTML(m) {
      const preview = `../assets/monsters/${m.id}/preview.png`;
      return `
        <article class="card">
          <div class="card__imageWrap">
            <img class="card__image" src="${preview}" alt="${m.name} preview" loading="lazy">
          </div>
          <div class="card__body">
            <div class="card__row">
              <div class="card__title">${m.name}</div>
              <div class="card__meta">Stage 1</div>
            </div>
            <div class="card__sub">${m.baseAsset} → ${m.hedgeAsset}</div>
            <div class="card__sub">Sim: +30% / −10%</div>
            <div class="card__price">Price: 1 Monstra Byte</div>
            <button class="card__buyBtn" type="button" data-monster-id="${m.id}">
              Buy for 1 Byte
            </button>
          </div>
        </article>
      `;
    }

    // Render monsters
    function renderMonsters() {
      const owned = monsters.filter(m => ownedMonsters.includes(m.id));
      activeGrid.innerHTML = owned.length === 0
        ? `<p>You don't have any active monsters yet. Visit the shop below to buy one!</p>`
        : owned.map(ownedCardHTML).join("");

      const shop = monsters.filter(m => !ownedMonsters.includes(m.id));
      shopGrid.innerHTML = shop.length === 0
        ? `<p>You've purchased all available monsters. 🎉</p>`
        : shop.map(shopCardHTML).join("");
    }

    renderMonsters();

    // Handle buying monsters
    shopGrid.addEventListener("click", (e) => {
      const btn = e.target.closest(".card__buyBtn");
      if (!btn) return;

      const monsterId = btn.dataset.monsterId;
      if (!monsterId || ownedMonsters.includes(monsterId)) return;

      if (monstraBytes < 1) {
        alert("You need at least 1 Monstra Byte to buy this monster.");
        return;
      }

      monstraBytes -= 1;
      ownedMonsters.push(monsterId);
      renderBytes();
      saveUserState();
      renderMonsters();
    });
  </script>
</body>
</html>
