<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monstra — Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join the monster trading league</p>

    <form class="auth-form">
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <input type="password" placeholder="Confirm Password" required />
      <button type="submit">Register</button>
    </form>

    <p class="auth-alt">
      Already registered?
      <a href="./index.html">Log in</a>
    </p>
  </div>

</body>
<script>
  const form = document.querySelector(".auth-form");

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const [emailInput, passInput, confirmInput] = form.querySelectorAll("input");
    const email = emailInput.value.trim();
    const password = passInput.value;
    const confirm = confirmInput.value;

    if (!email || !password) {
      alert("Email and password are required.");
      return;
    }

    if (password !== confirm) {
      alert("Passwords do not match.");
      return;
    }

    const raw = localStorage.getItem("monstra_users") || "{}";
    const users = JSON.parse(raw);

    if (users[email]) {
      alert("An account with that email already exists. Try logging in.");
      return;
    }

    // Store user (⚠️ plaintext – prototype only)
    users[email] = { password };
    localStorage.setItem("monstra_users", JSON.stringify(users));

    // Auto-login and redirect
    localStorage.setItem("monstra_currentUser", email);
    window.location.href = "./monsters/";
  });
</script>

</html>
