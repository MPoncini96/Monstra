<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monstra — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <h1 class="auth-title">Welcome to Monstra</h1>
    <p class="auth-sub">Log in to manage your Monster Traders</p>

    <form class="auth-form">
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>

    <p class="auth-alt">
      New here?
      <a href="./register.html">Create an account</a>
    </p>
  </div>

</body>
<script>
  const form = document.querySelector(".auth-form");

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const email = form.querySelector('input[type="email"]').value.trim();
    const password = form.querySelector('input[type="password"]').value;

    if (!email || !password) {
      alert("Please enter email and password.");
      return;
    }

    // Load users from localStorage
    const raw = localStorage.getItem("monstra_users") || "{}";
    const users = JSON.parse(raw);

    if (!users[email]) {
      alert("No account found with that email. Try registering.");
      return;
    }

    if (users[email].password !== password) {
      alert("Incorrect password.");
      return;
    }

    // Set current user and redirect
    localStorage.setItem("monstra_currentUser", email);
    window.location.href = "./monsters/";  // go to monsters overview
  });
</script>
 
</html>
