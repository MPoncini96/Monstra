<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monsters</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="../index.html" aria-label="Monstra Home">
        <span class="brand__dot"></span>
        <span class="brand__text">Monstra</span>
      </a>

      <button class="searchpill" type="button" aria-label="Search">
        <span class="searchpill__item">Monsters</span>
        <span class="searchpill__divider"></span>
        <span class="searchpill__item searchpill__muted">Stage</span>
        <span class="searchpill__divider"></span>
        <span class="searchpill__item searchpill__muted">Outcome</span>
        <span class="searchpill__icon">🔍</span>
      </button>
            
      <div class="menu">
        <span id="usernameTag"></span>

        <span id="bytesTag" class="menu__bytes">
          <span class="bytes-amount">0</span>
          <img src="../assets/coin.png" alt="Monstra byte coin" class="bytes-icon">
          <span class="bytes-label">Monstra Bytes</span>
        </span>

        <button id="logoutBtn" class="menu__link">Logout</button>
      </div>
    </div>
  </header>

  <main class="page">
    <h1 class="page__title">Monsters</h1>
    <div id="grid" class="cards"></div>
  </main>
  
  <script type="module">
    // --- Auth guard ---
    const email = localStorage.getItem("monstra_currentUser");
    if (!email) {
      window.location.href = "../index.html";
    }

    // --- Load user info ---
    const users = JSON.parse(localStorage.getItem("monstra_users") || "{}");
    const user = users[email] || {};

    const username = user.username || "Player";
    const monstraBytes = user.monstraBytes ?? 0; // treat missing as 0

    // --- Render username ---
    const usernameTag = document.getElementById("usernameTag");
    if (usernameTag) {
      usernameTag.textContent = `Hi, ${username}!`;
    }

    // --- Render Monstra Bytes (number stays, coin image stays) ---
    const bytesTag = document.getElementById("bytesTag");
    if (bytesTag) {
      const amountEl = bytesTag.querySelector(".bytes-amount");
      if (amountEl) {
        amountEl.textContent = monstraBytes;
      }
    }

    // --- Logout handling ---
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("monstra_currentUser");
      window.location.href = "../index.html"; // back to login
    });

    // --- Monsters grid (hard-coded for now) ---
    const monsters = [
      { id: "tauru",  name: "Tauru",  baseAsset: "TQQQ", hedgeAsset: "SQQQ" },
      { id: "aeros",  name: "Aeros",  baseAsset: "SPY",  hedgeAsset: "SH"   }
    ];

    const grid = document.getElementById("grid");

    grid.innerHTML = monsters.map(m => {
      const preview = `../assets/monsters/${m.id}/preview.png`;

      return `
        <a class="card" href="./monster.html?id=${m.id}">
          <div class="card__imageWrap">
            <img class="card__image" src="${preview}" alt="${m.name} preview" loading="lazy">
            <button class="card__save" type="button" aria-label="Save">♡</button>
          </div>

          <div class="card__body">
            <div class="card__row">
              <div class="card__title">${m.name}</div>
              <div class="card__meta">Stage 1</div>
            </div>
            <div class="card__sub">${m.baseAsset} → ${m.hedgeAsset}</div>
            <div class="card__sub">Sim: +30% / −10%</div>
          </div>
        </a>
      `;
    }).join("");

    grid.addEventListener("click", (e) => {
      const btn = e.target.closest(".card__save");
      if (btn) e.preventDefault();
    });
  </script>

</body>
</html>
