<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monster</title>
  <link rel="stylesheet" href="/Monstra/assets/tailwind.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <nav>
    <a href="../index.html">Home</a> |
    <a href="./index.html">Monsters</a>
  </nav>

  <h1 id="monsterName"></h1>
  <img id="monsterImg" alt="Monster art" style="max-width:320px; border-radius:16px;" />
  <p id="monsterStrategy"></p>

  <section>
    <h2>Status</h2>
    <ul>
      <li>Stage: <span id="stage"></span></li>
      <li>Active: <span id="active"></span></li>
      <li>Capital: <span id="capital"></span></li>
      <li>Last Outcome: <span id="lastOutcome"></span></li>
    </ul>
  </section>

  <section>
    <button id="activateBtn">Activate</button>
    <button id="simulateBtn">Simulate Round</button>
    <button id="resetBtn">Reset</button>
  </section>

  <script type="module" src="../js/app.js"></script>
</body>
</html>
