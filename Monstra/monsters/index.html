<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monsters</title>
  <link rel="stylesheet" href="/Monstra/assets/tailwind.css">
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="../index.html" aria-label="Monstra Home">
        <span class="brand__dot"></span>
        <span class="brand__text">Monstra</span>
      </a>

      <button class="searchpill" type="button" aria-label="Search">
        <span class="searchpill__item">Monsters</span>
        <span class="searchpill__divider"></span>
        <span class="searchpill__item searchpill__muted">Stage</span>
        <span class="searchpill__divider"></span>
        <span class="searchpill__item searchpill__muted">Outcome</span>
        <span class="searchpill__icon">🔍</span>
      </button>
            
      <div class="menu">
        <span id="usernameTag"></span>

        <span id="bytesTag" class="menu__bytes">
          <span class="bytes-amount">0</span>
          <img src="../assets/coin.png" alt="Monstra byte coin" class="bytes-icon">
          <span class="bytes-label">Monstra Bytes</span>
        </span>

        <button id="logoutBtn" class="menu__link">Logout</button>
      </div>
    </div>
  </header>

  <main class="page">
    <h1 class="page__title">Monsters</h1>

    <!-- Active Monsters Section -->
    <section class="monsters-section">
      <h2>Active Monsters</h2>
      <p class="section-subtitle">These are your current monsters.</p>
      <div id="activeGrid" class="cards"></div>
    </section>

    <!-- Shop Section -->
    <section class="monsters-section">
      <h2>Monster Shop</h2>
      <p class="section-subtitle">Buy new monsters for <strong>1 Monstra Byte</strong> each.</p>
      <div id="shopGrid" class="cards"></div>
    </section>
  </main>
  
  <script type="module">
    // --- Auth guard ---
    const email = localStorage.getItem("monstra_currentUser");
    if (!email) {
      window.location.href = "../index.html";
    }

    // --- Load user info ---
    const users = JSON.parse(localStorage.getItem("monstra_users") || "{}");
    const user = users[email] || {};

    const username = user.username || "Player";

    // Make these mutable so we can update when buying monsters
    let monstraBytes = user.monstraBytes ?? 0;           // treat missing as 0
    let ownedMonsters = user.ownedMonsters || [];        // array of monster ids

    // --- DOM references ---
    const usernameTag = document.getElementById("usernameTag");
    const bytesTag = document.getElementById("bytesTag");
    const activeGrid = document.getElementById("activeGrid");
    const shopGrid = document.getElementById("shopGrid");

    // --- Render username ---
    if (usernameTag) {
      usernameTag.textContent = `Hi, ${username}!`;
    }

    // --- Update header bytes ---
    function renderBytes() {
      if (!bytesTag) return;
      const amountEl = bytesTag.querySelector(".bytes-amount");
      if (amountEl) {
        amountEl.textContent = monstraBytes;
      }
    }
    renderBytes();

    // --- Save user back to localStorage ---
    function saveUserState() {
      user.monstraBytes = monstraBytes;
      user.ownedMonsters = ownedMonsters;
      users[email] = user;
      localStorage.setItem("monstra_users", JSON.stringify(users));
    }

    // --- Logout handling ---
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("monstra_currentUser");
      window.location.href = "../index.html"; // back to login
    });

    // --- Monsters catalog (hard-coded for now) ---
    const monsters = [
      { id: "tauru",  name: "Tauru",  baseAsset: "TQQQ", hedgeAsset: "SQQQ" },
      { id: "aeros",  name: "Aeros",  baseAsset: "SPY",  hedgeAsset: "SH"   }
    ];

    // --- Card templates ---
    function ownedCardHTML(m) {
      const preview = `../assets/monsters/${m.id}/preview.png`;
      return `
        <a class="card" href="./monster.html?id=${m.id}">
          <div class="card__imageWrap">
            <img class="card__image" src="${preview}" alt="${m.name} preview" loading="lazy">
          </div>

          <div class="card__body">
            <div class="card__row">
              <div class="card__title">${m.name}</div>
              <div class="card__meta">Stage 1</div>
            </div>
            <div class="card__sub">${m.baseAsset} → ${m.hedgeAsset}</div>
            <div class="card__sub">Sim: +30% / −10%</div>
            <div class="card__price">Owned</div>
          </div>
        </a>
      `;
    }

    function shopCardHTML(m) {
      const preview = `../assets/monsters/${m.id}/preview.png`;
      return `
        <article class="card">
          <div class="card__imageWrap">
            <img class="card__image" src="${preview}" alt="${m.name} preview" loading="lazy">
          </div>

          <div class="card__body">
            <div class="card__row">
              <div class="card__title">${m.name}</div>
              <div class="card__meta">Stage 1</div>
            </div>
            <div class="card__sub">${m.baseAsset} → ${m.hedgeAsset}</div>
            <div class="card__sub">Sim: +30% / −10%</div>
            <div class="card__price">Price: 1 Monstra Byte</div>
            <button 
              class="card__buyBtn" 
              type="button" 
              data-monster-id="${m.id}">
              Buy for 1 Byte
            </button>
          </div>
        </article>
      `;
    }

    // --- Render both sections ---
    function renderMonsters() {
      // Active monsters
      const owned = monsters.filter(m => ownedMonsters.includes(m.id));
      if (owned.length === 0) {
        activeGrid.innerHTML = `
          <p>You don't have any active monsters yet. Visit the shop below to buy one!</p>
        `;
      } else {
        activeGrid.innerHTML = owned.map(ownedCardHTML).join("");
      }

      // Shop monsters (not owned)
      const shop = monsters.filter(m => !ownedMonsters.includes(m.id));
      if (shop.length === 0) {
        shopGrid.innerHTML = `<p>You've purchased all available monsters. 🎉</p>`;
      } else {
        shopGrid.innerHTML = shop.map(shopCardHTML).join("");
      }
    }

    renderMonsters();

    // --- Handle buying monsters from the shop ---
    shopGrid.addEventListener("click", (e) => {
      const btn = e.target.closest(".card__buyBtn");
      if (!btn) return;

      const monsterId = btn.dataset.monsterId;
      if (!monsterId) return;

      if (monstraBytes < 1) {
        alert("You need at least 1 Monstra Byte to buy this monster.");
        return;
      }

      if (ownedMonsters.includes(monsterId)) {
        // Just in case
        return;
      }

      // Purchase logic
      monstraBytes -= 1;
      ownedMonsters.push(monsterId);

      renderBytes();
      saveUserState();
      renderMonsters();
    });
  </script>

</body>
</html>
