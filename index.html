<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monstra — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <h1 class="auth-title">Welcome to Monstra</h1>
    <p class="auth-sub">Log in to manage your Monster Traders</p>
  
    <form class="auth-form">
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>
  
    <!-- NEW reset button -->
    <button id="resetAllBtn" class="auth-reset">Reset Everything</button>
  
    <p class="auth-alt">
      New here?
      <a href="./register.html">Create an account</a>
    </p>
  </div>


</body>
<script>
  const form = document.querySelector(".auth-form");

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const email = form.querySelector('input[type="email"]').value.trim();
    const password = form.querySelector('input[type="password"]').value;

    const raw = localStorage.getItem("monstra_users") || "{}";
    const users = JSON.parse(raw);

    if (!users[email]) {
      alert("No account found. Try registering.");
      return;
    }

    if (users[email].password !== password) {
      alert("Wrong password.");
      return;
    }

    // Set logged-in user and redirect
    localStorage.setItem("monstra_currentUser", email);
    window.location.href = "./monsters/";
  });
  
</script>
<script>
  const resetBtn = document.getElementById("resetAllBtn");

  resetBtn.addEventListener("click", () => {
    const confirmReset = confirm("Delete ALL saved users and logins?");
    if (!confirmReset) return;

    localStorage.clear();   // Boom 💥 resets everything
    alert("All users cleared. Register again!");
    location.reload();      // Page refresh to clean state
  });
</script>

 
</html>
