<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monstra — Register</title>
  <link rel="stylesheet" href="/Monstra/assets/tailwind.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join the monster trading league</p>

    <!-- UPDATED FORM BELOW -->
    <form class="auth-form">
      <input type="text" placeholder="Username" required />
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <input type="password" placeholder="Confirm Password" required />
      <button type="submit">Register</button>
    </form>

    <p class="auth-alt">
      Already registered?
      <a href="./index.html">Log in</a>
    </p>
  </div>

</body>
<script>
  const form = document.querySelector(".auth-form");

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const [userInput, emailInput, passInput, confirmInput] = form.querySelectorAll("input");
    const username = userInput.value.trim();
    const email = emailInput.value.trim();
    const password = passInput.value;
    const confirm = confirmInput.value;

    if (!username || !email || !password) {
      alert("All fields are required.");
      return;
    }

    if (password !== confirm) {
      alert("Passwords do not match.");
      return;
    }

    const raw = localStorage.getItem("monstra_users") || "{}";
    const users = JSON.parse(raw);

    if (users[email]) {
      alert("Email already exists. Try logging in.");
      return;
    }

    // Store user (prototype only – plaintext password)
    users[email] = {
      username,
      password,
      monstraBytes: 0   // starting currency
    };

    localStorage.setItem("monstra_users", JSON.stringify(users));

    // Log them in and go to monsters
    localStorage.setItem("monstra_currentUser", email);
    window.location.href = "./monsters/";
  });
</script>


</html>
