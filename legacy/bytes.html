<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monstra — Monstra Bytes</title>
  <link rel="stylesheet" href="/Monstra/assets/css/app.css">
</head>

<script src="/Monstra/node_modules/preline/dist/preline.js"></script>

<body class="auth-body">
  <div class="auth-card">
    <h1 class="auth-title">Monstra Bytes</h1>
    <p class="auth-sub">In-game currency for your monster bots</p>

    <p class="auth-sub" id="bytesInfo">Loading balance...</p>

    <button id="buyOneBtn">Purchase 1 Monstra Byte</button>

    <p class="auth-alt" style="margin-top: 16px;">
      Go back to your monsters:
      <a href="./monsters/">Monsters overview</a>
    </p>
  </div>

  <script src="/Monstra/js/auth.js"></script>
  <script>
    const email = checkAuthGuard();
    if (!email) return;

    const user = getCurrentUser();
    const bytesInfo = document.getElementById("bytesInfo");
    const buyOneBtn = document.getElementById("buyOneBtn");

    function renderBytes() {
      bytesInfo.textContent = `You currently have 🪙 ${user.monstraBytes} Monstra Bytes.`;
    }

    renderBytes();

    buyOneBtn.addEventListener("click", () => {
      user.monstraBytes += 1;
      saveUser(email, user);
      renderBytes();
      alert("You purchased 1 Monstra Byte!");
    });
  </script>
</body>
</html>
