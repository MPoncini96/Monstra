<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monsters</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <nav><a href="../index.html">Home</a></nav>
  <h1>Monsters Overview</h1>

  <div id="grid" class="monster-grid"></div>

  <script type="module">
    const res = await fetch("../data/monsters.json");
    const monsters = await res.json();
    const grid = document.getElementById("grid");

    grid.innerHTML = monsters.map(m => `
      <a class="monster-card" href="./monster.html?id=${m.id}">
        <h2>${m.name}</h2>
        <p style="opacity:.8">${m.baseAsset} / ${m.hedgeAsset}</p>
      </a>
    `).join("");
  </script>
</body>
</html>
